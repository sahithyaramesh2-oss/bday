<!DOCTYPE html>
<html>
<head>
<title>Her Beautiful Moments</title>

<style>

body{
    margin:0;
    font-family: "Segoe UI", sans-serif;
    text-align:center;
    background: linear-gradient(-45deg,#ff9a9e,#ff7eb3,#fad0c4,#ffd1ff);
    background-size:400% 400%;
    animation: gradient 10s ease infinite;
}

@keyframes gradient{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

h1{
    color:white;
    margin-top:30px;
    font-size:42px;
}

/* gallery grid */

.gallery{
    column-count:3;
    column-gap:15px;
    padding:40px;
}

.gallery img{
    width:100%;
    margin-bottom:15px;
    border-radius:15px;
    cursor:pointer;
    transition:0.4s;
}

.gallery img:hover{
    transform:scale(1.05);
    box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

/* fullscreen viewer */

.viewer{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    display:none;
    justify-content:center;
    align-items:center;
}

.viewer img{
    max-width:80%;
    max-height:80%;
    border-radius:15px;
}

/* back button */

.back{
    display:inline-block;
    margin:20px;
    padding:12px 25px;
    background:white;
    color:#ff4b7d;
    border-radius:10px;
    text-decoration:none;
    font-weight:bold;
}

/* floating hearts */

.heart{
    position:fixed;
    bottom:-20px;
    font-size:20px;
    animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-800px);opacity:0;}
}

</style>
</head>

<body>

<h1>✨ happiest birthday ✨</h1>

<div class="gallery">

<img src="cat.jpeg" onclick="openImage(this)">
<img src="pic1.jpg.jpeg" onclick="openImage(this)">
<img src="pic3.jpeg" onclick="openImage(this)">
<img src="pic4.jpeg" onclick="openImage(this)">
<img src="pic5.jpeg" onclick="openImage(this)">
<img src="pic2.jpeg" onclick="openImage(this)">

</div>

<div class="viewer" id="viewer" onclick="closeImage()">
<img id="fullImg">
</div>

<a class="back" href="index.html">⬅ Back to Dashboard</a>

<script>

/* open full image */

function openImage(img){
    document.getElementById("viewer").style.display="flex"
    document.getElementById("fullImg").src=img.src
}

function closeImage(){
    document.getElementById("viewer").style.display="none"
}

/* floating hearts */

function createHeart(){
    const heart=document.createElement("div")
    heart.classList.add("heart")
    heart.innerHTML="💖"
    heart.style.left=Math.random()*100+"vw"
    heart.style.fontSize=(20+Math.random()*20)+"px"

    document.body.appendChild(heart)

    setTimeout(()=>{heart.remove()},6000)
}

setInterval(createHeart,600)

</script>

</body>
</html>
