<!DOCTYPE html>
<html>
<head>
<title>Our Memories</title>

<style>

body{
    font-family: Arial;
    text-align:center;
    margin:0;
    padding:0;
    color:white;
    background: linear-gradient(-45deg,#ff758c,#ff7eb3,#fad0c4,#ffd1ff);
    background-size:400% 400%;
    animation: gradient 10s ease infinite;
}

/* Background animation */
@keyframes gradient{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

h1{
    margin-top:30px;
    font-size:45px;
}

/* gallery grid */

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:40px;
}

.memory{
    background:white;
    border-radius:15px;
    overflow:hidden;
    color:black;
    box-shadow:0 10px 20px rgba(0,0,0,0.3);
    transition:0.4s;
}

.memory:hover{
    transform:scale(1.05);
}

.memory img{
    width:100%;
    height:250px;
    object-fit:cover;
}

.caption{
    padding:15px;
    font-weight:bold;
}

/* back button */

.back{
    display:inline-block;
    margin:30px;
    padding:12px 25px;
    background:white;
    color:#ff4b7d;
    border-radius:10px;
    text-decoration:none;
    font-weight:bold;
}

/* floating hearts */

.heart{
    position:fixed;
    bottom:-20px;
    font-size:20px;
    animation:float 6s linear infinite;
}

@keyframes float{
    0%{transform:translateY(0);opacity:1;}
    100%{transform:translateY(-800px);opacity:0;}
}

</style>
</head>

<body>

<h1>📸 Our Beautiful Memories</h1>

<div class="gallery">

<div class="memory">
<img src="best.jpeg">
<div class="caption">the day we went out and lived to the fullest 🎉</div>
</div>

<div class="memory">
<img src="biceps.jpeg">
<div class="caption">same mentality same chaos🌍</div>
</div>

<div class="memory">
<img src="selfie.jpeg">
<div class="caption">you are more than just a sisterrrrrrr❤️</div>
</div>

<div class="memory">
<img src="standing.jpeg">
<div class="caption">will never grow up 😆</div>
</div>

</div>

<a class="back" href="index.html">⬅ Back to Dashboard</a>

<script>

/* floating hearts generator */

function createHeart(){
    const heart=document.createElement("div")
    heart.classList.add("heart")
    heart.innerHTML="💖"
    heart.style.left=Math.random()*100+"vw"
    heart.style.fontSize=(20+Math.random()*20)+"px"

    document.body.appendChild(heart)

    setTimeout(()=>{heart.remove()},6000)
}

setInterval(createHeart,600)

</script>

</body>
</html>
