<!DOCTYPE html>
<html>
<head>
<title>Birthday Surprise</title>

<style>

body{
margin:0;
font-family:"Segoe UI";
text-align:center;
background:linear-gradient(-45deg,#ff758c,#ff7eb3,#fad0c4,#ffd1ff);
background-size:400% 400%;
animation:gradient 10s ease infinite;
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

@keyframes gradient{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.screen{
display:none;
}

.active{
display:block;
}

button{
padding:15px 30px;
font-size:18px;
border:none;
border-radius:10px;
background:#ff4b7d;
color:white;
cursor:pointer;
}

.cake{
font-size:120px;
}

.flame{
font-size:40px;
margin-top:-70px;
}

/* balloons */

.balloon{
position:fixed;
bottom:-100px;
font-size:40px;
animation:rise 6s linear forwards;
}

@keyframes rise{
0%{transform:translateY(0)}
100%{transform:translateY(-1000px)}
}

/* confetti */

.confetti{
position:fixed;
width:10px;
height:10px;
top:0;
animation:fall 4s linear forwards;
}

@keyframes fall{
0%{transform:translateY(0) rotate(0deg);}
100%{transform:translateY(100vh) rotate(720deg);}
}

/* gift */

#gift{
font-size:120px;
cursor:pointer;
}

/* slideshow */

#slide{
width:350px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

</style>
</head>

<body>

<!-- birthday music -->
<audio id="music" loop>
<source src="hpy.mp3" type="audio/mp3">
</audio>

<!-- SCREEN 1 -->

<div id="screen1" class="screen active">
<h1>Birthday Surprise 🎂</h1>
<h2 id="count">3</h2>
</div>

<!-- SCREEN 2 -->

<div id="screen2" class="screen">
<h1>Make a Wish</h1>
<div class="cake">🎂</div>
<div class="flame">🔥</div>
<br><br>
<button onclick="blow()">Blow Candle 💨</button>
</div>

<!-- SCREEN 3 -->

<div id="screen3" class="screen">
<h1>🎉 Happy Birthday! 🎉</h1>
<h2>Celebration Time</h2>
</div>

<!-- SCREEN 4 -->

<div id="screen4" class="screen">
<h1>Open Your Gift 🎁</h1>
<div id="gift" onclick="openGift()">🎁</div>
</div>

<!-- SCREEN 5 -->

<div id="screen5" class="screen">
<h1>💖 Our Memories 💖</h1>
<img id="slide">
<p>You are the best sister ever ❤️</p>
</div>
<a class="back" href="index.html">⬅ Back to Dashboard</a>
<script>

/* change screen */

function show(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"))
document.getElementById(id).classList.add("active")
}

/* countdown */

let c=3

let timer=setInterval(function(){

c--

document.getElementById("count").innerHTML=c

if(c==0){

clearInterval(timer)

show("screen2")

}

},1000)

/* blow candle */

function blow(){

show("screen3")

document.getElementById("music").play()

confettiExplosion()

startBalloons()

setTimeout(function(){

show("screen4")

},4000)

}

/* balloons */

function startBalloons(){

setInterval(function(){

let b=document.createElement("div")

b.className="balloon"

b.innerHTML="🎈"

b.style.left=Math.random()*100+"vw"

document.body.appendChild(b)

setTimeout(()=>b.remove(),6000)

},300)

}

/* confetti */

function confettiExplosion(){

for(let i=0;i<120;i++){

let conf=document.createElement("div")

conf.className="confetti"

conf.style.left=Math.random()*100+"vw"

conf.style.background=
["#ff4b7d","#ffd93d","#6bcBef","#9d4edd","#ff8fab"]
[Math.floor(Math.random()*5)]

document.body.appendChild(conf)

setTimeout(()=>conf.remove(),4000)

}

}

/* slideshow photos */

let photos=[
"bell.jpeg",
"kolar.jpg",
"mee-WA0023.jpg",
"tr.jpeg",
"my.jpeg"
]

let index=0

function startSlideshow(){

document.getElementById("slide").src=photos[0]

setInterval(function(){

index=(index+1)%photos.length

document.getElementById("slide").src=photos[index]

},2000)

}

/* gift open */

function openGift(){

show("screen5")

startSlideshow()

}

</script>

</body>
</html>
